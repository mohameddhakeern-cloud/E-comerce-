<head>

        rel="stylesheet">
    <!--font Awesome icons-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

</head>

<body>
    <!--Navbar-->
    <nav class="navbar">
        <h1>DHARIYA COUTURE</h1>
        <div class="navbar-links">
            <p class="navbar-link"><a href="index.html">HOME</a></p>
            <p class="navbar-link"><a href="collection.html">COLLECTIONS</a></p>
            <p class="navbar-link"><a href="about.html">ABOUT</a></p>
            <p class="navbar-link"><a href="contact.html">CONTACT US</a></p>
        </div>
        <div class="menu-toggle">
            <i class="fa-solid fa-bars" onclick="openNav()"></i>
        </div>
    </nav>
    <!--Side Navbar -->
    <div class="side-navbar">
        <p style="text-align: right;">
            <i class="fa-solid fa-xmark close-btn" onclick="closeNav()"></i>
        </p>
        <div class="side-navbar-links">
            <p class="side-navbar-link"><a href="index.html">HOME</a></p>
            <p class="side-navbar-link"><a href="collection.html">COLLECTIONS</a></p>
            <p class="side-navbar-link"><a href="about.html">ABOUT</a></p>
            <p class="side-navbar-link"><a href="contact.html">CONTACT US</a></p>
        </div>
    </div>
    <!--contact section-->
    <div class="contact-us">
        <h2>Contact Us</h2>
        <form class="contact-form">
            
                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name" placeholder="Enter Your Name" required>
                
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="Enter Your Email" required>
                
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="5" placeholder="Enter your feedback?" required></textarea>
                
                    <button type="submit" class="submit-btn">Submit</button>
              
        </form>

    </div>
 
    <!--Footer-->
    <div class="footer">
        <div class="footer-container">
            <div class="footer-box-1">
                <h3 class="footer-heading">DHARIYA COUTURE</h3>
                <p>Your one-stop shop for trendy and affordable fashion.</p>
                <div class="footer-social-icons">
                    <i class="fa-brands fa-facebook-f" style="color: #ffff;"></i>
                    <i class="fa-brands fa-whatsapp" style="color: #ffff;"></i>
                    <i class="fa-brands fa-instagram" style="color: #ffff;"></i>
                </div>

            </div>

        </div>
           <p>@ 2025 DHARIYA COUTURE</p>
    </div>

 <script src="index.js"></script>
